<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Georgia, serif;
      margin: 40px;
      color: #2c1810;
      line-height: 1.8;
    }
    h1 {
      font-size: 28px;
      color: #8B4513;
      border-bottom: 2px solid #8B4513;
      padding-bottom: 10px;
    }
    h2 {
      font-size: 20px;
      color: #6B3410;
      margin-top: 30px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header img {
      max-width: 200px;
    }
    .titulo-missao {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 30px;
    }
    .conteudo {
      text-align: justify;
    }
    .rodape {
      margin-top: 60px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    .verso {
      font-style: italic;
      color: #8B4513;
      margin: 20px 0;
      padding-left: 20px;
      border-left: 3px solid #8B4513;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="titulo-missao">
      Vana Madhuryam — Hari-katha Diária
    </div>
  </div>

  <h1>{{ titulo }}</h1>

  <p><strong>Data:</strong> {{ data }}</p>
  <p><strong>Fonte:</strong> {{ fonte }}</p>

  {% if verso %}
  <div class="verso">
    {{ verso }}
  </div>
  {% endif %}

  <div class="conteudo">
    {{ conteudo | safe }}
  </div>

  <div class="rodape">
    Srila Bhaktivedanta Vana Goswami Maharaj — vanamadhuryam.com
  </div>

</body>
</html>
